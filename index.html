<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>恋するプロンプト・ラボ</title>
  <style>

:root {
  --ui-white: rgba(255, 255, 255, 0.86);
  --mint: #9bcfc2; --mint-dark: #4f9b8f;
  --pink: #d98fa5; --pink-dark: #b96c82;
  --navy: #24304f; --navy-soft: #4d5b82;
  --lavender: #a996dc; --lavender-dark: #7f6cc0;
  --text: #3c3440;
  --shadow: 0 18px 40px rgba(40, 30, 60, 0.28);
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  overflow: hidden; font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "Noto Serif JP", serif;
  color: var(--text); background: #f7eef5;
}
button { font-family: inherit; }
#app { position: relative; width: 100vw; height: 100dvh; min-height: 100vh; overflow: hidden; background: #f7eef5; }
.background {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center; transform: scale(1.02);
  transition: opacity 420ms ease; z-index: 0;
}
.soft-overlay {
  position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(circle at 50% 12%, rgba(255,255,255,0.16), transparent 38%),
              linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(40,20,70,0.12));
  pointer-events: none;
}
.screen { position: absolute; inset: 0; z-index: 2; display: none; }
.screen.active { display: block; }
.hide { display: none !important; }
.title-image-wrap { position: absolute; inset: 0; overflow: hidden; background: #f7eef5; cursor: pointer; touch-action: manipulation; }
.title-visual {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center; display: block; z-index: 1;
  pointer-events: none; user-select: none; -webkit-user-drag: none;
}
.title-fallback {
  position: absolute; inset: 0; z-index: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 28px; text-align: center;
  background: radial-gradient(circle at 50% 18%, rgba(255,255,255,0.92), rgba(247,238,245,0.78) 42%, rgba(215,200,238,0.68)),
              linear-gradient(135deg, #fff7fb, #edf7ff);
}
.eyebrow { margin: 0 0 10px; letter-spacing: 0.28em; font-size: clamp(12px, 2vw, 15px); color: var(--lavender-dark); font-family: "Hiragino Sans", "Yu Gothic", sans-serif; }
.title { margin: 0; font-size: clamp(34px, 8vw, 74px); line-height: 1.13; color: #654c7c; text-shadow: 0 3px 0 rgba(255,255,255,0.85); letter-spacing: 0.04em; }
.subtitle { margin: 18px auto 30px; max-width: 560px; font-size: clamp(14px, 3.4vw, 20px); line-height: 1.9; color: #695d70; }
.title-start-fullscreen { position: absolute; inset: 0; z-index: 5; width: 100%; height: 100%; border: none; padding: 0; margin: 0; background: transparent; cursor: pointer; touch-action: manipulation; }
.title-start-guide {
  position: absolute; left: 50%; bottom: max(18px, env(safe-area-inset-bottom));
  transform: translateX(-50%); padding: 10px 18px; border-radius: 999px;
  background: rgba(255, 255, 255, 0.72); color: #6f5b7d; font-size: 14px;
  letter-spacing: 0.05em; backdrop-filter: blur(8px); box-shadow: 0 6px 16px rgba(60, 40, 80, 0.15);
  pointer-events: none; z-index: 6;
}
.top-buttons { position: absolute; top: max(16px, env(safe-area-inset-top)); right: 16px; z-index: 6; display: flex; gap: 8px; }
.mini-control {
  width: 42px; height: 42px; border: none; border-radius: 50%; cursor: pointer;
  background: rgba(255,255,255,0.7); color: #695d70; font-weight: 700;
  box-shadow: 0 8px 18px rgba(40,30,60,0.14); backdrop-filter: blur(8px);
}
#gameScreen { cursor: pointer; }
.sprite-area { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
.character {
  position: absolute; left: 50%; bottom: clamp(140px, 24dvh, 205px);
  max-height: min(76dvh, 820px); max-width: min(62vw, 520px);
  transform: translateX(-50%); object-fit: contain;
  filter: drop-shadow(0 18px 18px rgba(35, 25, 45, 0.28));
  opacity: 0; transition: opacity 260ms ease, transform 260ms ease;
}
.character.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
.dialogue-wrap {
  position: absolute; left: 50%; bottom: max(16px, env(safe-area-inset-bottom));
  width: min(980px, calc(100vw - 28px)); transform: translateX(-50%); z-index: 4;
}
.nameplate {
  display: inline-flex; align-items: center; min-width: 148px; min-height: 42px;
  padding: 8px 20px; margin-left: clamp(12px, 4vw, 34px); margin-bottom: -6px;
  position: relative; z-index: 2; border-radius: 18px 18px 8px 8px;
  color: #fff; font-size: 18px; font-weight: 700; letter-spacing: 0.08em;
  box-shadow: 0 10px 18px rgba(40,30,60,0.18);
}
.dialogue-box {
  position: relative; min-height: 128px; padding: 28px 78px 26px 30px;
  border-radius: 28px; background: var(--ui-white);
  border: 1px solid rgba(255,255,255,0.9); box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
}
.dialogue-text { margin: 0; font-size: clamp(17px, 3.2vw, 24px); line-height: 1.78; letter-spacing: 0.04em; white-space: pre-line; word-break: break-word; }
.next-btn {
  position: absolute; right: 24px; bottom: 20px; width: 46px; height: 46px;
  border-radius: 50%; border: none; cursor: pointer; color: #fff; font-size: 20px; font-weight: bold;
  background: linear-gradient(135deg, var(--pink), var(--lavender));
  box-shadow: 0 10px 18px rgba(160,110,180,0.26);
}
.choice-layer {
  position: absolute; inset: 0; z-index: 5; display: none; align-items: center; justify-content: center;
  padding: 20px; background: rgba(45, 35, 65, 0.28); backdrop-filter: blur(3px);
}
.choice-layer.active { display: flex; }
.choice-card {
  width: min(760px, 94vw); padding: clamp(22px, 5vw, 34px); border-radius: 30px;
  background: rgba(255,255,255,0.88); border: 1px solid rgba(255,255,255,0.9);
  box-shadow: var(--shadow); text-align: center;
}
.choice-title { margin: 0 0 20px; color: #564866; font-size: clamp(18px, 4vw, 26px); line-height: 1.6; }
.choice-list { display: grid; gap: 12px; }
.choice-btn {
  width: 100%; border: none; border-radius: 20px; padding: 16px 18px; cursor: pointer;
  color: #fff; font-size: clamp(15px, 3.4vw, 19px); line-height: 1.5; font-weight: 700;
  box-shadow: 0 10px 18px rgba(80,60,120,0.18);
  transition: transform 150ms ease, opacity 150ms ease;
}
.choice-haruto { background: linear-gradient(135deg, var(--mint), #7fbab0); }
.choice-shion { background: linear-gradient(135deg, var(--navy), var(--navy-soft)); }
.choice-rei { background: linear-gradient(135deg, var(--lavender), #8bb6ee); }
.choice-btn:hover, .next-btn:hover, .mini-control:hover, .small-btn:hover { transform: translateY(-2px); }
.choice-btn:active, .next-btn:active, .mini-control:active, .small-btn:active { transform: translateY(0); opacity: 0.86; }
.end-wrap {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; padding: 24px;
  text-align: center; background: rgba(255,255,255,0.12); backdrop-filter: blur(2px);
}
.end-card {
  width: min(720px, 92vw); padding: clamp(28px, 6vw, 54px); border-radius: 30px;
  background: rgba(255,255,255,0.84); border: 1px solid rgba(255,255,255,0.9);
  box-shadow: var(--shadow); backdrop-filter: blur(14px);
}
.end-title { margin: 0 0 12px; font-size: clamp(34px, 7vw, 64px); color: #654c7c; }
.end-subtitle { margin: 0 0 28px; font-size: clamp(17px, 3.6vw, 24px); line-height: 1.8; color: #5d5366; }
.end-buttons { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
.small-btn { border: none; border-radius: 999px; padding: 14px 28px; cursor: pointer; color: #fff; font-size: 16px; font-weight: 700; background: linear-gradient(135deg, var(--pink), var(--lavender)); box-shadow: 0 10px 20px rgba(160, 110, 180, 0.26); }
.small-btn.secondary { background: linear-gradient(135deg, rgba(105,93,112,0.78), rgba(154,143,194,0.78)); }

.route-final-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  z-index: 0;
}
.route-final-overlay {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: linear-gradient(to bottom, rgba(20, 12, 35, 0.06), rgba(20, 12, 35, 0.34));
  pointer-events: none;
}
.route-final-panel {
  position: absolute;
  left: 50%;
  bottom: max(22px, env(safe-area-inset-bottom));
  transform: translateX(-50%);
  z-index: 2;
  width: min(920px, calc(100vw - 28px));
  padding: clamp(16px, 3vw, 24px);
  border-radius: 28px;
  background: rgba(255, 255, 255, 0.76);
  border: 1px solid rgba(255,255,255,0.9);
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
  text-align: center;
}
.route-final-title {
  margin: 0 0 6px;
  font-size: clamp(22px, 4vw, 36px);
  color: #5f4a72;
  letter-spacing: 0.06em;
}
.route-final-message {
  margin: 0 0 16px;
  font-size: clamp(14px, 2.6vw, 18px);
  line-height: 1.7;
  color: #65556d;
}
.route-final-buttons {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}
.route-link-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: min(240px, 100%);
  padding: 13px 22px;
  border-radius: 999px;
  text-decoration: none;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--pink), var(--lavender));
  box-shadow: 0 10px 20px rgba(160, 110, 180, 0.26);
}
.route-link-btn.line { background: linear-gradient(135deg, #62c884, #42b96d); }
.route-link-btn.home { background: linear-gradient(135deg, #91b7e8, #8f8cd8); }
.route-link-btn.title-back { background: linear-gradient(135deg, rgba(105,93,112,0.82), rgba(154,143,194,0.82)); border: none; cursor: pointer; }
.route-final-disclaimer {
  margin: 14px auto 0;
  max-width: 760px;
  font-size: clamp(11px, 2.2vw, 13px);
  line-height: 1.65;
  color: rgba(72, 58, 82, 0.78);
}

@media (max-width: 768px) {
  .route-final-panel { bottom: max(12px, env(safe-area-inset-bottom)); padding: 14px; border-radius: 22px; }
  .route-final-message { margin-bottom: 12px; }
  .route-link-btn { width: 100%; padding: 12px 16px; font-size: 14px; }
  .route-final-disclaimer { margin-top: 10px; font-size: 11px; }
}

@media (max-width: 768px) {
  .title-start-guide { font-size: 12px; padding: 8px 14px; }
  .character { bottom: clamp(150px, 28dvh, 210px); max-height: 63dvh; max-width: 82vw; }
  .dialogue-wrap { width: calc(100vw - 18px); }
  .nameplate { min-width: 112px; min-height: 36px; padding: 6px 16px; font-size: 15px; margin-left: 18px; }
  .dialogue-box { min-height: 142px; padding: 22px 56px 22px 20px; border-radius: 24px; }
  .next-btn { right: 14px; bottom: 16px; width: 40px; height: 40px; font-size: 18px; }
}

  </style>
</head>
<body>
  <main id="app">
    <img id="bg" class="background" src="images/bg_lab.png" alt="背景" />
    <div class="soft-overlay"></div>

    <div class="top-buttons hide" id="topButtons">
      <button class="mini-control" id="restartBtn" title="タイトルへ">↺</button>
      <button class="mini-control" id="soundBtn" title="効果音ON/OFF">♪</button>
    </div>

    <section id="titleScreen" class="screen active">
      <div class="title-image-wrap" id="titleClickArea">
        <img src="images/title_screen.png" alt="恋するプロンプト・ラボ タイトル画面" class="title-visual" />
        <div class="title-fallback">
          <p class="eyebrow">AI OTOME VISUAL NOVEL</p>
          <h1 class="title">恋する<br />プロンプト・ラボ</h1>
          <p class="subtitle">タイトル画像が表示されない場合は<br />images/title_screen.png の名前と場所を確認してね</p>
        </div>
        <button id="titleStartButton" class="title-start-fullscreen" type="button" aria-label="ゲームスタート"></button>
        <div class="title-start-guide">Tap anywhere to start</div>
      </div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="sprite-area">
        <img id="character" class="character" src="" alt="キャラクター" />
      </div>
      <div class="dialogue-wrap">
        <div id="nameplate" class="nameplate">結乃</div>
        <div class="dialogue-box">
          <p id="dialogueText" class="dialogue-text"></p>
          <button id="nextBtn" class="next-btn" aria-label="次へ">▼</button>
        </div>
      </div>
      <div id="choiceLayer" class="choice-layer">
        <div class="choice-card">
          <h2 id="choiceTitle" class="choice-title">選択してください</h2>
          <div id="choiceList" class="choice-list"></div>
        </div>
      </div>
    </section>

    <section id="endScreen" class="screen">
      <div class="end-wrap">
        <div class="end-card">
          <h2 id="endTitle" class="end-title">END</h2>
          <p id="endMessage" class="end-subtitle"></p>
          <div class="end-buttons">
            <button id="nextEpisodeBtn" class="small-btn">次の話へ</button>
            <button id="againBtn" class="small-btn secondary">タイトルへ</button>
          </div>
        </div>
      </div>
    </section>

    <section id="routeFinalScreen" class="screen">
      <img id="routeFinalBg" class="route-final-bg" src="" alt="エンディング画像" />
      <div class="route-final-overlay"></div>
      <div class="route-final-panel">
        <h2 id="routeFinalTitle" class="route-final-title">Thank you for playing</h2>
        <p id="routeFinalMessage" class="route-final-message">遊んでくれてありがとう。</p>
        <div class="route-final-buttons">
          <a class="route-link-btn home" href="https://irasutotuyaku.com/" target="_blank" rel="noopener noreferrer">イラスト通訳アカデミアHPを見る</a>
          <a class="route-link-btn line" href="https://line.me/R/ti/p/@439gxuod" target="_blank" rel="noopener noreferrer">公式LINEへ行く</a>
          <button id="routeFinalTitleBtn" class="route-link-btn title-back" type="button">タイトルへ戻る</button>
        </div>
        <p class="route-final-disclaimer">本作品はAIサービスをモチーフにした個人制作のファンゲームです。<br />各社公式とは関係ありません。</p>
      </div>
    </section>
  </main>

  <script>

const assets = {
  "bgRoom": "images/bg_room.png",
  "bgRoomPromptlab": "images/bg_room_promptlab.png",
  "bgLab": "images/bg_lab.png",
  "bgWordroom": "images/bg_wordroom.png",
  "cgWordCards": "images/cg_word_cards.png",

  "endShion": "images/end_shion.png",
  "endRei": "images/end_rei.png",
  "endNormal": "images/end_normal.png",

};
const episode1 = [
  {
    "bg": "bgRoom",
    "char": null,
    "name": "地の文",
    "text": "深夜0時を少し過ぎた頃。\n\n机の上には、開きっぱなしのノート。\n真っ白なキャンバス。\nそして、何度も書き直した企画メモ。"
  },
  {
    "bg": "bgRoom",

    "text": "……だめだ。全然まとまらない。"
  },
  {

  {

        {

document.addEventListener("DOMContentLoaded", () => {
  const colors = {
    "結乃": "linear-gradient(135deg, var(--pink), var(--pink-dark))",
    "晴人": "linear-gradient(135deg, var(--mint), var(--mint-dark))",
    "紫苑": "linear-gradient(135deg, var(--navy), var(--navy-soft))",
    "玲": "linear-gradient(135deg, var(--lavender), var(--lavender-dark))"
  };

  let state = { episode: 1, index: 0, haruto: 0, shion: 0, rei: 0, branch: null, finalRoute: null, locked: false };
  let currentScript = [];
  let nextEpisodeTarget = null;
  let audioCtx = null;
  let soundEnabled = true;
  let lastBgSrc = assets.bgLab;

  const bg = document.getElementById("bg");
  const character = document.getElementById("character");
  const dialogueText = document.getElementById("dialogueText");
  const nameplate = document.getElementById("nameplate");
  const titleScreen = document.getElementById("titleScreen");
  const gameScreen = document.getElementById("gameScreen");
  const endScreen = document.getElementById("endScreen");
  const routeFinalScreen = document.getElementById("routeFinalScreen");
  const choiceLayer = document.getElementById("choiceLayer");
  const choiceTitle = document.getElementById("choiceTitle");
  const choiceList = document.getElementById("choiceList");
  const titleClickArea = document.getElementById("titleClickArea");
  const titleStartButton = document.getElementById("titleStartButton");
  const nextBtn = document.getElementById("nextBtn");
  const againBtn = document.getElementById("againBtn");
  const nextEpisodeBtn = document.getElementById("nextEpisodeBtn");
  const restartBtn = document.getElementById("restartBtn");
  const soundBtn = document.getElementById("soundBtn");
  const topButtons = document.getElementById("topButtons");
  const endTitle = document.getElementById("endTitle");
  const endMessage = document.getElementById("endMessage");
  const routeFinalBg = document.getElementById("routeFinalBg");
  const routeFinalTitle = document.getElementById("routeFinalTitle");
  const routeFinalMessage = document.getElementById("routeFinalMessage");
  const routeFinalTitleBtn = document.getElementById("routeFinalTitleBtn");

  function resolveAsset(value) {
    if (!value) return null;
    return assets[value] || value;
  }

  function unlockAudio() {
    try {
      const AudioClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioClass) return;
      if (!audioCtx) audioCtx = new AudioClass();
      if (audioCtx.state === "suspended") audioCtx.resume();
    } catch (error) {
      console.warn("Audio skipped:", error);
    }
  }

  function tone({ frequency = 440, duration = 0.08, type = "sine", volume = 0.08, delay = 0 }) {
    if (!soundEnabled) return;
    unlockAudio();
    if (!audioCtx) return;
    const now = audioCtx.currentTime + delay;
    const oscillator = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    oscillator.type = type;
    oscillator.frequency.setValueAtTime(frequency, now);
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
    oscillator.connect(gain);
    gain.connect(audioCtx.destination);
    oscillator.start(now);
    oscillator.stop(now + duration + 0.03);
  }

  function playSfx(name) {
    if (!soundEnabled) return;
    if (name === "tap") tone({ frequency: 760, duration: 0.045, type: "triangle", volume: 0.035 });
    if (name === "start") {
      tone({ frequency: 523, duration: 0.08, type: "sine", volume: 0.055 });
      tone({ frequency: 659, duration: 0.08, type: "sine", volume: 0.055, delay: 0.07 });
      tone({ frequency: 784, duration: 0.12, type: "sine", volume: 0.06, delay: 0.14 });
    }
    if (name === "choice") {
      tone({ frequency: 587, duration: 0.08, type: "triangle", volume: 0.045 });
      tone({ frequency: 740, duration: 0.09, type: "triangle", volume: 0.04, delay: 0.075 });
    }
    if (name === "end") {
      tone({ frequency: 523, duration: 0.1, type: "sine", volume: 0.045 });
      tone({ frequency: 659, duration: 0.1, type: "sine", volume: 0.045, delay: 0.1 });
      tone({ frequency: 784, duration: 0.22, type: "sine", volume: 0.05, delay: 0.2 });
    }
  }

  function setActiveScreen(screen) {
    titleScreen.classList.remove("active");
    gameScreen.classList.remove("active");
    endScreen.classList.remove("active");
    routeFinalScreen.classList.remove("active");
    screen.classList.add("active");
    topButtons.classList.toggle("hide", screen === titleScreen || screen === endScreen || screen === routeFinalScreen);
  }

  function setBackground(src) {
    if (!src || bg.getAttribute("src") === src) return;
    lastBgSrc = src;
    bg.style.opacity = 0;
    window.setTimeout(() => {
      bg.src = src;
      bg.style.opacity = 1;
    }, 120);
  }

  function setCharacter(src) {
    if (!src) {
      character.classList.remove("visible");
      window.setTimeout(() => character.removeAttribute("src"), 120);
      return;
    }
    if (character.getAttribute("src") === src) {
      character.classList.add("visible");
      return;
    }
    character.classList.remove("visible");
    window.setTimeout(() => {
      character.src = src;
      character.classList.add("visible");
    }, 90);
  }

  function getFinalRoute() {
    const scores = { haruto: state.haruto, shion: state.shion, rei: state.rei };
    const entries = Object.entries(scores).sort((a, b) => b[1] - a[1]);
    if (entries[0][1] === entries[1][1]) return "normal";
    return entries[0][0];
  }

  function renderScene() {
    const current = currentScript[state.index];
    if (!current) {
      showEnd();
      return;
    }

    if (current.type === "choice") {
      showChoices(current);
      return;
    }

    if (current.type === "autoRoute") {
      const route = getFinalRoute();
      state.finalRoute = route;
      const before = currentScript.slice(0, state.index);
      currentScript = [
        ...before,
        ...(current.branches[route] || current.branches.normal || []),
        ...currentScript.slice(state.index + 1)
      ];
      state.index = before.length;
      renderScene();
      return;
    }

    choiceLayer.classList.remove("active");
    setBackground(resolveAsset(current.bg));
    setCharacter(resolveAsset(current.char));

    if (current.name === "地の文" || current.name === "画面") {
      nameplate.classList.add("hide");
    } else {
      nameplate.classList.remove("hide");
      nameplate.textContent = current.name;
      nameplate.style.background = colors[current.name] || "linear-gradient(135deg, #9a8fc2, #c18fa8)";
    }

    dialogueText.textContent = current.text || "";
  }

  function nextScene() {
    if (state.locked || choiceLayer.classList.contains("active") || !gameScreen.classList.contains("active")) return;
    playSfx("tap");
    state.index += 1;
    renderScene();
  }

  function showChoices(current) {
    state.locked = true;
    playSfx("choice");
    choiceTitle.textContent = current.question;
    choiceList.innerHTML = "";
    current.options.forEach(selected => {
      const btn = document.createElement("button");
      btn.className = `choice-btn ${selected.className}`;
      btn.textContent = selected.label;
      btn.addEventListener("click", event => {
        event.stopPropagation();
        chooseRoute(current, selected.route);
      });
      choiceList.appendChild(btn);
    });
    choiceLayer.classList.add("active");
  }

  function chooseRoute(current, route) {
    if (route === "haruto") state.haruto += 1;
    if (route === "shion") state.shion += 1;
    if (route === "rei") state.rei += 1;
    state.branch = route;

    const before = currentScript.slice(0, state.index);
    currentScript = [
      ...before,
      ...(current.branches[route] || []),
      ...(current.after || []),
      ...currentScript.slice(state.index + 1)
    ];

    state.index = before.length;
    state.locked = false;
    choiceLayer.classList.remove("active");
    renderScene();
  }


  function showRouteFinal() {
    playSfx("end");
    const route = state.finalRoute || getFinalRoute();
    const data = {
      haruto: {
        image: assets.afterEndHaruto,
        title: "晴人 × ChatGPT",
        message: "どんな質問も、どんな想いも。これからも、あなたのそばで一緒に。"
      },
      shion: {
        image: assets.afterEndShion,
        title: "紫苑 × Claude",
        message: "心のすべてを、君と。未完成な一歩も、最後まで形に。"
      },
      rei: {
        image: assets.afterEndRei,
        title: "玲 × Gemini",
        message: "ふたつの想い、ひとつの未来へ。正解より、君らしい方へ。"
      },
      normal: {
        image: assets.endNormal,
        title: "恋するプロンプト・ラボ",
        message: "あなたの中にある“まだ言葉にならない想い”も、いつかきっと形になる。"
      }
    }[route] || {
      image: assets.cgFinalPrompt,
      title: "恋するプロンプト・ラボ",
      message: "遊んでくれてありがとう。"
    };

    routeFinalBg.src = data.image;
    routeFinalTitle.textContent = data.title;
    routeFinalMessage.textContent = data.message;
    setCharacter(null);
    setActiveScreen(routeFinalScreen);
  }

  function showEnd() {
    if (state.episode === 5) {
      showRouteFinal();
      return;
    }

    playSfx("end");
    const episode = episodes[state.episode];
    nextEpisodeTarget = episode.next;
    endTitle.textContent = episode.title;

    const routeText = state.branch === "haruto" ? "晴人との絆が少し深まった。" :
                      state.branch === "shion" ? "紫苑との絆が少し深まった。" :
                      state.branch === "rei" ? "玲との絆が少し深まった。" : "";

    endMessage.innerHTML = `${routeText ? routeText + "<br><br>" : ""}${episode.nextTitle.replace(/\n/g, "<br>")}`;
    nextEpisodeBtn.classList.toggle("hide", !nextEpisodeTarget);
    setCharacter(null);
    setActiveScreen(endScreen);
  }

  function startEpisode(number) {
    const episode = episodes[number];
    if (!episode) return;
    state.episode = number;
    state.index = 0;
    state.branch = null;
    state.locked = false;
    currentScript = [...episode.script];
    setActiveScreen(gameScreen);
    renderScene();
  }

  function startGame() {
    try {
      unlockAudio();
      playSfx("start");
    } catch (error) {
      console.warn("Start sound skipped:", error);
    }
    lastBgSrc = assets.bgLab;
    state = { episode: 1, index: 0, haruto: 0, shion: 0, rei: 0, branch: null, finalRoute: null, locked: false };
    startEpisode(1);
  }

  function backToTitle() {
    playSfx("tap");
    choiceLayer.classList.remove("active");
    routeFinalScreen.classList.remove("active");
    setCharacter(null);
    setBackground(assets.bgLab);
    setActiveScreen(titleScreen);
  }

  function bindTitleStart(element) {
    if (!element) return;
    element.addEventListener("click", event => {
      event.preventDefault();
      event.stopPropagation();
      startGame();
    });
    element.addEventListener("touchend", event => {
      event.preventDefault();
      event.stopPropagation();
      startGame();
    }, { passive: false });
  }

  bindTitleStart(titleClickArea);
  bindTitleStart(titleStartButton);

  againBtn.addEventListener("click", backToTitle);
  routeFinalTitleBtn.addEventListener("click", backToTitle);
  nextEpisodeBtn.addEventListener("click", () => {
    playSfx("start");
    if (nextEpisodeTarget) startEpisode(nextEpisodeTarget);
  });
  restartBtn.addEventListener("click", event => {
    event.stopPropagation();
    backToTitle();
  });
  soundBtn.addEventListener("click", event => {
    event.stopPropagation();
    unlockAudio();
    soundEnabled = !soundEnabled;
    soundBtn.textContent = soundEnabled ? "♪" : "×";
    soundBtn.title = soundEnabled ? "効果音ON" : "効果音OFF";
    if (soundEnabled) playSfx("choice");
  });
  nextBtn.addEventListener("click", event => {
    event.stopPropagation();
    nextScene();
  });
  gameScreen.addEventListener("click", nextScene);
  document.addEventListener("keydown", event => {
    if (event.key === "Enter" || event.key === " ") nextScene();
  });
});

  </script>
</body>
</html>
